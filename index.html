<!DOCTYPE html>
<html lang="id">
  <head>
    <base target="_top">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem Arsip Digital - PT PLN (Persero)</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
      body { 
        background-color: #0b132b;
        background-image: 
          radial-gradient(circle at 50% 50%, rgba(0, 119, 182, 0.25) 0%, transparent 60%),
          linear-gradient(rgba(255, 255, 255, 0.03) 1px, transparent 1px),
          linear-gradient(90deg, rgba(255, 255, 255, 0.03) 1px, transparent 1px);
        background-size: 100% 100%, 45px 45px, 45px 45px;
        font-family: 'Plus Jakarta Sans', sans-serif;
        min-height: 100vh;
        padding: 40px 20px;
        color: #ffffff;
      }
      
      .main-container {
        background: rgba(255, 255, 255, 0.07);
        backdrop-filter: blur(20px);
        -webkit-backdrop-filter: blur(20px);
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 30px;
        box-shadow: 0 30px 60px rgba(0, 0, 0, 0.5);
        padding: 40px;
        max-width: 1200px;
        margin: 0 auto;
      }

      .pln-logo-box {
        display: flex;
        align-items: center;
        gap: 15px;
        background: rgba(255, 255, 255, 0.1);
        padding: 10px 20px;
        border-radius: 15px;
        border: 1px solid rgba(0, 210, 255, 0.3);
        width: fit-content;
      }

      .right-form-panel {
        background: rgba(255, 255, 255, 0.96);
        padding: 30px;
        color: #1e293b;
        border-radius: 20px;
      }

      .table-panel {
        background: rgba(255, 255, 255, 0.96);
        padding: 30px;
        color: #1e293b;
        border-radius: 20px;
        margin-top: 30px;
      }

      .form-label {
        font-weight: 600;
        color: #334155;
        font-size: 0.85rem;
      }

      .input-group-text {
        background: #f1f5f9;
        color: #64748b;
        border: 1px solid #cbd5e1;
        border-right: none;
        border-radius: 12px 0 0 12px;
      }

      .form-control, .form-select {
        background: #ffffff;
        border: 1px solid #cbd5e1;
        border-left: none;
        border-radius: 0 12px 12px 0;
        padding: 12px 16px;
      }

      .btn-pln {
        background: linear-gradient(135deg, #00529b 0%, #003366 100%);
        border: none;
        border-radius: 12px;
        padding: 14px;
        font-weight: 600;
        color: #ffffff;
      }

      .btn-pln:hover {
        background: linear-gradient(135deg, #0066cc 0%, #004488 100%);
        color: #fff;
      }
    </style>
  </head>
  <body>

    <div class="main-container">
      <div class="d-flex justify-content-between align-items-center mb-4 flex-wrap gap-3">
        <div class="pln-logo-box">
          <img src="https://upload.wikimedia.org/wikipedia/commons/2/20/Logo_PLN.svg" alt="Logo PLN" height="40">
          <div class="d-flex flex-column text-start">
            <span class="fw-bold text-white" style="font-size: 1rem;">PLN PERSERO</span>
            <span class="text-white-50" style="font-size: 0.75rem;">UP3 MALANG</span>
          </div>
        </div>
        <div>
          <h2 class="fw-bold m-0 text-info">Sistem Arsip Digital</h2>
        </div>
      </div>

      <div class="row g-4">
        <div class="col-md-12">
          <div class="right-form-panel">
            <h4 class="fw-bold text-dark mb-3"><i class="fa-solid fa-file-pen me-2 text-primary"></i>Form Input Dokumen</h4>
            <form id="formArsip">
              <div class="row">
                <div class="col-md-4 mb-3">
                  <label class="form-label">Divisi Pemilik Dokumen</label>
                  <div class="input-group">
                    <span class="input-group-text"><i class="fa-solid fa-building-user"></i></span>
                    <select class="form-select" id="divisi" required>
                      <option value="">Pilih Divisi...</option>
                      <option value="SDM">Divisi SDM & Organisasi</option>
                      <option value="Keuangan">Divisi Keuangan & Akuntansi</option>
                      <option value="Sistem Informasi">Divisi Sistem Informasi (IT)</option>
                      <option value="Distribusi">Divisi Distribusi & Transmisi</option>
                    </select>
                  </div>
                </div>
                <div class="col-md-4 mb-3">
                  <label class="form-label">Nama Dokumen</label>
                  <div class="input-group">
                    <span class="input-group-text"><i class="fa-solid fa-file-invoice"></i></span>
                    <input type="text" class="form-control" id="namaDokumen" placeholder="Contoh: Kontrak Kerja" required>
                  </div>
                </div>
                <div class="col-md-4 mb-3">
                  <label class="form-label">Tempat Peletakan Arsip</label>
                  <div class="input-group">
                    <span class="input-group-text"><i class="fa-solid fa-box-archive"></i></span>
                    <select class="form-select" id="kategori" required>
                      <option value="">Pilih Lokasi Peletakan...</option>
                      <option value="Lemari_A">Lemari A (Data Utama)</option>
                      <option value="Lemari_B">Lemari B (Operasional)</option>
                      <option value="Lemari_C">Lemari C (Arsip Pusat)</option>
                    </select>
                  </div>
                </div>
                <div class="col-md-6 mb-3">
                  <label class="form-label">Masa Berlaku / Retensi</label>
                  <div class="input-group">
                    <span class="input-group-text"><i class="fa-solid fa-calendar-check"></i></span>
                    <input type="date" class="form-control" id="masaRetensi" required>
                  </div>
                </div>
                <div class="col-md-6 mb-4">
                  <label class="form-label">Link Google Drive Dokumen</label>
                  <div class="input-group">
                    <span class="input-group-text"><i class="fa-solid fa-link"></i></span>
                    <input type="url" class="form-control" id="linkFile" placeholder="https://drive.google.com/..." required>
                  </div>
                </div>
              </div>
              <button type="submit" class="btn btn-pln w-100">
                <i class="fa-solid fa-cloud-arrow-up me-2"></i> Unggah & Simpan Dokumen
              </button>
            </form>
            <div id="notifikasi" class="mt-3"></div>
          </div>
        </div>
      </div>

      <div class="table-panel">
        <div class="d-flex justify-content-between align-items-center mb-3 flex-wrap gap-2">
          <h4 class="fw-bold text-dark m-0"><i class="fa-solid fa-database me-2 text-success"></i>Data Monitoring Masa Retensi</h4>
          <div class="d-flex gap-2">
            <input type="text" id="cariDokumen" class="form-control style-search" placeholder="Cari dokumen..." style="border-left: 1px solid #cbd5e1; border-radius: 12px; width: 250px; padding: 8px 15px;">
          </div>
        </div>
        <div class="table-responsive">
          <table class="table table-striped table-hover align-middle m-0">
            <thead class="table-dark">
              <tr>
                <th>Divisi</th>
                <th>Nama Dokumen</th>
                <th>Lokasi Peletakan</th>
                <th>Masa Retensi</th>
                <th>Link Akses</th>
                <th>User Input</th>
              </tr>
            </thead>
            <tbody id="bodyTabel">
              <tr>
                <td colspan="6" class="text-center text-muted py-4">Memuat data arsip...</td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>

    </div>

    <script>
      // Load data pertama kali saat halaman dibuka
      window.addEventListener('DOMContentLoaded', muatDataTabel);

      function muatDataTabel() {
        google.script.run.withSuccessHandler(function(res) {
          var tbody = document.getElementById('bodyTabel');
          tbody.innerHTML = "";
          
          if(res.status === "success" && res.data.length > 0) {
            res.data.forEach(function(item) {
              var tr = document.createElement('tr');
              tr.innerHTML = `
                <td><span class="badge bg-secondary p-2">${item.divisi}</span></td>
                <td class="fw-semibold">${item.namaDokumen}</td>
                <td><i class="fa-solid fa-box text-warning me-1"></i> ${item.kategori}</td>
                <td class="fw-bold text-danger">${item.masaRetensi}</td>
                <td><a href="${item.linkFile}" target="_blank" class="btn btn-sm btn-outline-primary"><i class="fa-solid fa-arrow-up-right-from-square"></i> Buka File</a></td>
                <td class="text-muted small">${item.userInput}</td>
              `;
              tbody.appendChild(tr);
            });
          } else {
            tbody.innerHTML = '<tr><td colspan="6" class="text-center py-4 text-muted">Belum ada data arsip yang tersimpan.</td></tr>';
          }
        }).ambilDataArsip();
      }

      // Handle Submit Form
      document.getElementById('formArsip').addEventListener('submit', function(e) {
        e.preventDefault();
        
        var data = {
          divisi: document.getElementById('divisi').value,
          namaDokumen: document.getElementById('namaDokumen').value,
          kategori: document.getElementById('kategori').value,
          masaRetensi: document.getElementById('masaRetensi').value,
          linkFile: document.getElementById('linkFile').value,
          userInput: "Super Admin"
        };

        var notifDiv = document.getElementById('notifikasi');
        notifDiv.innerHTML = '<div class="alert alert-info text-center shadow-sm"><i class="fa-solid fa-spinner fa-spin me-2"></i> Memproses data arsip...</div>';

        google.script.run.withSuccessHandler(function(res) {
          if(res.status === "success") {
            notifDiv.innerHTML = '<div class="alert alert-success text-center shadow-sm"><i class="fa-solid fa-circle-check me-2"></i> ' + res.message + '</div>';
            document.getElementById('formArsip').reset();
            muatDataTabel(); // Muat ulang tabel secara otomatis tanpa reload page!
          } else {
            notifDiv.innerHTML = '<div class="alert alert-danger text-center shadow-sm"><i class="fa-solid fa-circle-exclamation me-2"></i> Gagal: ' + res.message + '</div>';
          }
        }).simpanArsip(data);
      });

      // Fitur Live Search Dokumen
      document.getElementById('cariDokumen').addEventListener('input', function() {
        var keyword = this.value.toLowerCase();
        var rows = document.querySelectorAll('#bodyTabel tr');
        
        rows.forEach(function(row) {
          var text = row.innerText.toLowerCase();
          if(text.includes(keyword)) {
            row.style.display = "";
          } else {
            row.style.display = "none";
          }
        });
      });
    </script>
  </body>
</html>
